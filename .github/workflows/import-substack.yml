name: Import Substack posts

on:
  workflow_dispatch:
  push:
    branches:
      - claude/substack-post-sync-yw1y6w

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch the Substack feed (real headless Chrome)
        run: |
          npm install --no-save playwright-core
          node --input-type=module - <<'EOF'
          import fs from 'node:fs';
          import { chromium } from 'playwright-core';
          const browser = await chromium.launch({ channel: 'chrome' });
          const context = await browser.newContext({
            userAgent:
              'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36',
          });
          const page = await context.newPage();
          const nav = await page.goto('https://jonathanpolitzki.substack.com/', { waitUntil: 'domcontentloaded', timeout: 60000 });
          console.log(`homepage: HTTP ${nav.status()}, title "${await page.title()}"`);
          await page.waitForTimeout(8000); // let any bot challenge resolve

          // The /feed endpoint 403s from CI even in a real browser, so use the
          // same-origin JSON API instead and rebuild an RSS-shaped feed from it.
          const posts = await page.evaluate(async () => {
            const r = await fetch('/api/v1/archive?sort=new&limit=20');
            if (!r.ok) throw new Error(`archive fetch failed: ${r.status}`);
            const list = await r.json();
            const out = [];
            for (const p of list) {
              const pr = await fetch(`/api/v1/posts/${p.slug}`);
              if (!pr.ok) throw new Error(`post ${p.slug} fetch failed: ${pr.status}`);
              const full = await pr.json();
              out.push({
                title: full.title,
                link: full.canonical_url,
                description: full.description || '',
                pubDate: full.post_date,
                html: full.body_html || '',
              });
            }
            return out;
          });
          const cdata = (s) => `<![CDATA[${String(s).replaceAll(']]>', ']]]]><![CDATA[>')}]]>`;
          const xml = `<rss><channel>${posts
            .map(
              (p) =>
                `<item><title>${cdata(p.title)}</title><link>${p.link}</link>` +
                `<description>${cdata(p.description)}</description><pubDate>${p.pubDate}</pubDate>` +
                `<content:encoded>${cdata(p.html)}</content:encoded></item>`
            )
            .join('\n')}</channel></rss>`;
          fs.writeFileSync('/tmp/feed.xml', xml);
          console.log(`built feed with ${posts.length} posts, ${xml.length} bytes`);
          await browser.close();
          EOF
      - name: Import new posts from the Substack feed
        run: node scripts/import-substack.mjs --feed-file /tmp/feed.xml
      - name: Commit and push any new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/writing
          if git diff --cached --quiet; then
            echo "No new posts to import."
          else
            git commit -m "Import new Substack posts"
            git push
          fi
