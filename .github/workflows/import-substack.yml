name: Import Substack posts

on:
  workflow_dispatch:
  push:
    branches:
      - claude/substack-post-sync-yw1y6w

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Import new posts from the Substack feed
        run: node scripts/import-substack.mjs
      - name: Commit and push any new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/writing
          if git diff --cached --quiet; then
            echo "No new posts to import."
          else
            git commit -m "Import new Substack posts"
            git push
          fi
