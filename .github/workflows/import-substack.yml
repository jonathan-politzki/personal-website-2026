name: Import Substack posts

on:
  workflow_dispatch:
  push:
    branches:
      - claude/substack-post-sync-yw1y6w

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch the Substack feed (headed Chrome under xvfb)
        run: |
          npm install --no-save playwright-core
          xvfb-run --auto-servernum node --input-type=module - <<'EOF'
          import fs from 'node:fs';
          import { chromium } from 'playwright-core';
          // Headed real Chrome with its native fingerprint: Cloudflare's
          // "Just a moment..." challenge won't clear for headless/spoofed-UA.
          const browser = await chromium.launch({ channel: 'chrome', headless: false });
          const page = await browser.newPage();
          const nav = await page.goto('https://jonathanpolitzki.substack.com/', { waitUntil: 'domcontentloaded', timeout: 60000 });
          console.log(`homepage: HTTP ${nav.status()}, title "${await page.title()}"`);
          for (let i = 0; i < 15 && /just a moment/i.test(await page.title()); i++) {
            await page.waitForTimeout(3000);
          }
          console.log(`after challenge wait: title "${await page.title()}"`);

          const grab = (path) =>
            page.evaluate(async (p) => {
              const r = await fetch(p);
              return { status: r.status, body: r.ok ? await r.text() : '' };
            }, path);

          let xml;
          const feed = await grab('/feed');
          console.log(`/feed: HTTP ${feed.status}`);
          if (feed.status === 200) {
            xml = feed.body;
          } else {
            // Fall back to the JSON API and rebuild an RSS-shaped feed from it.
            const archive = await grab('/api/v1/archive?sort=new&limit=20');
            console.log(`/api/v1/archive: HTTP ${archive.status}`);
            if (archive.status !== 200) throw new Error('both /feed and the JSON API are blocked');
            const posts = [];
            for (const p of JSON.parse(archive.body)) {
              const post = await grab(`/api/v1/posts/${p.slug}`);
              if (post.status !== 200) throw new Error(`post ${p.slug}: HTTP ${post.status}`);
              const full = JSON.parse(post.body);
              posts.push({
                title: full.title,
                link: full.canonical_url,
                description: full.description || '',
                pubDate: full.post_date,
                html: full.body_html || '',
              });
            }
            const cdata = (s) => `<![CDATA[${String(s).replaceAll(']]>', ']]]]><![CDATA[>')}]]>`;
            xml = `<rss><channel>${posts
              .map(
                (p) =>
                  `<item><title>${cdata(p.title)}</title><link>${p.link}</link>` +
                  `<description>${cdata(p.description)}</description><pubDate>${p.pubDate}</pubDate>` +
                  `<content:encoded>${cdata(p.html)}</content:encoded></item>`
              )
              .join('\n')}</channel></rss>`;
          }
          fs.writeFileSync('/tmp/feed.xml', xml);
          console.log(`wrote feed, ${xml.length} bytes`);
          await browser.close();
          EOF
      - name: Import new posts from the Substack feed
        run: node scripts/import-substack.mjs --feed-file /tmp/feed.xml
      - name: Commit and push any new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/writing
          if git diff --cached --quiet; then
            echo "No new posts to import."
          else
            git commit -m "Import new Substack posts"
            git push
          fi
