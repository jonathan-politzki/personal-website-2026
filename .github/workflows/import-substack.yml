name: Import Substack posts

on:
  workflow_dispatch:
  push:
    branches:
      - claude/substack-post-sync-yw1y6w

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch the Substack feed (real headless Chrome)
        run: |
          npm install --no-save playwright-core
          node --input-type=module - <<'EOF'
          import fs from 'node:fs';
          import { chromium } from 'playwright-core';
          const browser = await chromium.launch({ channel: 'chrome' });
          const context = await browser.newContext({
            userAgent:
              'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36',
          });
          const page = await context.newPage();
          await page.goto('https://jonathanpolitzki.substack.com/', { waitUntil: 'domcontentloaded', timeout: 60000 });
          await page.waitForTimeout(8000); // let any bot challenge resolve
          const xml = await page.evaluate(async () => {
            const r = await fetch('/feed');
            if (!r.ok) throw new Error(`feed fetch failed: ${r.status}`);
            return await r.text();
          });
          fs.writeFileSync('/tmp/feed.xml', xml);
          console.log(`fetched ${xml.length} bytes`);
          await browser.close();
          EOF
      - name: Import new posts from the Substack feed
        run: node scripts/import-substack.mjs --feed-file /tmp/feed.xml
      - name: Commit and push any new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/writing
          if git diff --cached --quiet; then
            echo "No new posts to import."
          else
            git commit -m "Import new Substack posts"
            git push
          fi
