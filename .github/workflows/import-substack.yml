name: Import Substack posts

on:
  workflow_dispatch:
  push:
    branches:
      - claude/substack-post-sync-yw1y6w

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch the Substack feed (Chrome TLS impersonation)
        run: |
          pip install --quiet curl_cffi
          python3 - <<'EOF'
          from curl_cffi import requests
          r = requests.get('https://jonathanpolitzki.substack.com/feed', impersonate='chrome')
          r.raise_for_status()
          open('/tmp/feed.xml', 'w').write(r.text)
          print(f'fetched {len(r.text)} bytes')
          EOF
      - name: Import new posts from the Substack feed
        run: node scripts/import-substack.mjs --feed-file /tmp/feed.xml
      - name: Commit and push any new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/writing
          if git diff --cached --quiet; then
            echo "No new posts to import."
          else
            git commit -m "Import new Substack posts"
            git push
          fi
